<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Net22 → Net52 Stream URL Scraper</title>
<style>
    body {
        font-family: Arial;
        background: #111;
        color: #fff;
        text-align: center;
        padding: 40px;
    }
    input, button {
        padding: 10px;
        font-size: 16px;
        margin: 10px;
    }
    #result {
        margin-top: 20px;
        color: #0f0;
    }
</style>
</head>
<body>

<h2>Net22 → Net52 Stream URL Scraper</h2>

<input type="text" id="idInput" placeholder="Enter ID e.g. 81760050">
<button onclick="scrapeUrl()">Get Stream URL</button>

<div id="result"></div>

<script>
async function scrapeUrl() {
    const id = document.getElementById("idInput").value.trim();
    const resultDiv = document.getElementById("result");

    if (!id) {
        resultDiv.innerHTML = "⚠ Please enter an ID.";
        return;
    }

    // IMPORTANT: Replace <your-vercel-domain> after deployment
    const apiUrl = `https://<your-vercel-project>.vercel.app/api/net22?id=${id}`;

    try {
        const res = await fetch(apiUrl);
        const data = await res.json();

        if (!Array.isArray(data)) {
            resultDiv.innerHTML = "❌ Invalid response.";
            return;
        }

        const file = data[0]?.sources?.[0]?.file;
        if (!file) {
            resultDiv.innerHTML = "❌ Stream not found.";
            return;
        }

        const finalUrl = `https://net52.cc${file}`;

        resultDiv.innerHTML = `
            ✅ Final Stream URL:<br><br>
            <a href="${finalUrl}" target="_blank">${finalUrl}</a>
        `;
    } catch (err) {
        console.error(err);
        resultDiv.innerHTML = "❌ Error fetching from API.";
    }
}
</script>

</body>
</html>
